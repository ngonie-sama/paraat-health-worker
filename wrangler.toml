name = "paraat-health-worker"
main = "src/index.js"
compatibility_date = "2025-07-01"

# Two schedules:
#   "*/5 * * * *" — cheap reachability pings every 5 minutes (no tokens).
#   "0 6 * * *"   — the daily real synthetic prompt test (see SYNTHETIC_CRON below).
# Both are UTC. Change "0 6 * * *" to move the daily run; keep SYNTHETIC_CRON in sync.
[triggers]
crons = ["*/5 * * * *", "0 6 * * *"]

# Non-secret vars. (For production, move PARAAT_HEALTH_TOKEN + CF_AIG_TOKEN to
# `wrangler secret put <NAME>` — a secret overrides the var of the same name.)
[vars]
PARAAT_API_BASE = "https://your-paraat-backend.example.com"
ENVIRONMENT = "production"

# Shared secret guarding the backend health endpoints (X-Health-Token). Must match
# the backend's health_check.token setting / HEALTH_CHECK_TOKEN. Hardcoded here for
# now to get things running with zero setup; rotate + move to a secret later.
PARAAT_HEALTH_TOKEN = "paraat-health-elula-2026"

# Real end-to-end user test (sends actual prompts through the live pipeline).
# Runs ONLY on the cron matching SYNTHETIC_CRON (the daily one) — the 5-min cron
# does pings only. Set RUN_SYNTHETIC="false" to disable entirely. Cost stays to
# roughly a dollar or two a month at one run/day. A full run can take 60-120s
# (MCP agents are slow synchronous calls), so SYNTHETIC_TIMEOUT_MS gives headroom.
RUN_SYNTHETIC = "true"
SYNTHETIC_CRON = "0 6 * * *"
SYNTHETIC_TIMEOUT_MS = "150000"

# Alerts. Either (a) set ALERT_WEBHOOK_URL to an incoming webhook, OR (b) post as
# the Mattermost bot below (reuses your existing bot token). If MATTERMOST_TOKEN +
# MATTERMOST_CHANNEL are set, the bot API is used and ALERT_WEBHOOK_URL is ignored.
# MATTERMOST_CHANNEL may be a 26-char channel id or a channel name (needs MATTERMOST_TEAM).
# Set MATTERMOST_TOKEN with `wrangler secret put MATTERMOST_TOKEN` (don't commit it).
MATTERMOST_URL = "https://matter.elula.cloud"
MATTERMOST_TEAM = "elula-online"
MATTERMOST_CHANNEL = "town-square"

# Optional: KV namespace enables change-based alerts (only alert on down/recovery
# transitions instead of every run) and powers the /status last-run view.
# Create it once:  wrangler kv namespace create HEALTH_STATE
# then paste the returned id below and uncomment.
# [[kv_namespaces]]
# binding = "HEALTH_STATE"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
